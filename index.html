    <style>
      :root { --glow: #00ff41; --bg: #020202; }
      body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
      
      /* DYNAMIC BACKGROUND WITH PARTICLES IN BACKGROUND */
      .bg-particle-container {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none;
      }
      .particle-glow-1 { position: absolute; top: -10%; right: -10%; width: 600px; height: 600px; background: rgba(16, 185, 129, 0.05); filter: blur(120px); border-radius: 50%; }
      .particle-glow-2 { position: absolute; bottom: -10%; left: -10%; width: 600px; height: 600px; background: rgba(37, 99, 235, 0.05); filter: blur(120px); border-radius: 50%; }
      
      /* FLOATING PARTICLES */
      .particle { position: absolute; width: 4px; height: 4px; background: rgba(0, 255, 65, 0.3); border-radius: 50%; animation: float 20s infinite; }
      @keyframes float {
          0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
          10% { opacity: 1; }
          90% { opacity: 1; }
          100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
      }
    </style>
  </head>
  <body>
    <!-- DYNAMIC BACKGROUND -->
    <div class="bg-particle-container">
        <div class="particle-glow-1"></div>
        <div class="particle-glow-2"></div>
        <div id="particles-container"></div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>

    <script>
      // PARTICLE SYSTEM
      function createParticles() {
          const container = document.getElementById('particles-container');
          if (!container) return;
          for (let i = 0; i < 20; i++) {
              const particle = document.createElement('div');
              particle.className = 'particle';
              particle.style.left = Math.random() * 100 + '%';
              particle.style.animationDelay = Math.random() * 20 + 's';
              particle.style.animationDuration = (15 + Math.random() * 10) + 's';
              container.appendChild(particle);
          }
      }
      window.addEventListener('DOMContentLoaded', createParticles);
    </script>
  </body>
